name: 回填历史并构建关系图

on:
  workflow_dispatch:
    inputs:
      since:
        description: "回填起始日期"
        default: "2025-07-01"
      min_importance:
        description: "保留的最低重要性(1-5)"
        default: "3"

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 回填历史政策
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BACKFILL_SINCE: ${{ github.event.inputs.since }}
          MIN_IMPORTANCE: ${{ github.event.inputs.min_importance }}
        run: python scraper/backfill.py

      - name: 构建关系图
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scraper/build_graph.py

      - name: 提交
        run: |
          git config user.name "policy-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/major.json docs/graph.json
          git diff --cached --quiet || git commit -m "backfill + graph $(date -u +%F)"
          git push
